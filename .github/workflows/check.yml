name: Check space left

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3

      # Check

      - name: Check log file sizes
        run: du -sh /home/runner/runners/2.317.0/_diag/*

      - name: Check disk space usage
        run: df -h

      # - name: Delete old and unused docker image
      #   run: docker system prune -f

      - name: Chech home
        run: ls -la /home
